<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lowtide</title>
  <meta name="description" content="Lowtide builds calm, private browser tools. First up: Wisp, a tab suspender that frees real RAM without losing your tabs." />
  <style>
    :root { --blue: #4f7cf6; --ink: #18233a; --muted: #5b6678; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: linear-gradient(135deg, #e9f1fd, #ffffff);
      color: var(--ink); font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .wrap { max-width: 560px; padding: 40px 24px; text-align: center; }
    .tile { width: 64px; height: 64px; border-radius: 16px; margin: 0 auto 20px;
      background: linear-gradient(135deg, #5b86f8, #3b63d4); color: #fff;
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 34px; }
    h1 { font-size: 40px; margin: 0 0 10px; }
    p { color: var(--muted); font-size: 19px; line-height: 1.6; margin: 0 auto 28px; max-width: 460px; }
    .card { background: #fff; border: 1px solid #e6ebf3; border-radius: 16px; padding: 22px 24px;
      text-align: left; display: inline-block; }
    .card b { font-size: 18px; }
    .card span { color: var(--muted); display: block; margin: 4px 0 12px; font-size: 15px; }
    a { color: var(--blue); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tile">L</div>
    <h1>Lowtide</h1>
    <p>Calm, private browser tools. Local by default — no accounts, no tracking.</p>
    <div class="card">
      <b>Wisp</b>
      <span>Sleeps inactive tabs to free real RAM, without losing them.</span>
      <a href="./privacy.html">Wisp privacy policy →</a>
    </div>
  </div>
</body>
</html>
